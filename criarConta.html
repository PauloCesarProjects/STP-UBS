<!DOCTYPE html>
<!-- Declara o documento como HTML5 -->
<html lang="pt-BR">
<head>
  <!-- Metadados da página -->
  <meta charset="UTF-8">
  <title>Crie uma Conta - STP-UBS</title>
  <!-- Estilos gerais do site -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho com o título do sistema -->
  <header>
  <div class="header-top">
    <img src="icones/LOGO.png" class="logo-img" alt="STP-UBS">
  </div>
  <nav>
    <a href="index.html"><img src="icones/INICIO.png" class="icon" alt=""><span>Início</span></a>
    <a href="adicionarpaciente.html"><img src="icones/ADICIONAP.png" class="icon" alt=""><span>Adicionar</span></a>
    <a href="prioridades.html"><img src="icones/PREFERENCIA.png" class="icon" alt=""><span>Prioridades</span></a>
    <a href="mapaPrioridade.html"><img src="icones/MAPA.png" class="icon" alt=""><span>Mapa</span></a>
    <a href="fale.html"><img src="icones/SUPORTE.png" class="icon" alt=""><span>Suporte</span></a>
    <a href="sobre.html"><img src="icones/SOBRE.png" class="icon" alt=""><span>Sobre</span></a>
  </nav>
</header>

  <!-- Conteúdo principal da página de criação de conta -->
  <main>
    <section class="content">
      <h2>Crie uma Conta</h2>
      <p>Preencha os dados abaixo para criar sua conta no STP-UBS.</p>
      <div id="messageBox"></div>

      <!-- Formulário de criação de conta -->
      <form class="signup-form">
        <!-- Campo de nome completo -->
        <label for="nome">Nome completo:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>

        <!-- Campo de e-mail -->
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <!-- Campo de senha -->
        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Crie uma senha" required>

        <!-- Campo de registro profissional (CRM ou COREM) -->
        <label for="registro">CRM ou COREM:</label>
        <input type="text" id="registro" name="registro" placeholder="Digite seu número de registro" required>

        <!-- Botão de envio do formulário -->
        <button type="submit" class="login-btn">Criar Conta</button>
      </form>
      <p style="margin-top: 16px;">Já tem conta? <a href="login.html">Faça login</a>.</p>
    </section>
  </main>
<script src="auth.js"></script>
  <script src="contaScript.js"></script>

  <footer>
  <strong>STP-UBS</strong>
  <p>Sistema de Triagem Preventiva para Unidades Básicas de Saúde</p>
  
</footer>

</body>
</html>
