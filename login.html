<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - STP-UBS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
  <div class="header-top">
    <img src="ICONES/LOGO.png" class="logo-img" alt="STP-UBS">
  </div>
  <nav>
    <a href="index.html"><img src="ICONES/INICIO.png" class="icon" alt=""><span>Início</span></a>
    <a href="adicionarpaciente.html"><img src="ICONES/ADICIONAP.png" class="icon" alt=""><span>Adicionar</span></a>
    <a href="prioridades.html"><img src="ICONES/PREFERENCIA.png" class="icon" alt=""><span>Prioridades</span></a>
    <a href="mapaPrioridade.html"><img src="ICONES/MAPA.png" class="icon" alt=""><span>Mapa</span></a>
    <a href="fale.html"><img src="ICONES/SUPORTE.png" class="icon" alt=""><span>Suporte</span></a>
    <a href="sobre.html"><img src="ICONES/SOBRE.png" class="icon" alt=""><span>Sobre</span></a>
  </nav>
</header>

  <main>
    <section class="content">
      <h2>Login</h2>
      <p>Entre com seu e-mail e senha para acessar o sistema.</p>
      <div id="messageBox"></div>
      <form class="login-form">
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

        <button type="submit" class="login-btn">Entrar</button>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="loginScript.js"></script>

  <footer>
  <strong>STP-UBS</strong>
  <p>Sistema de Triagem Preventiva para Unidades Básicas de Saúde</p>
</footer>

</body>
</html>
