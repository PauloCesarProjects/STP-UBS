<!DOCTYPE html>
<!-- Página de ajuda ou teste do STP-UBS com navegação e conteúdo similar ao site principal -->
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Fale com o STP-UBS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="icones/LOGO.png" class="logo-img" alt="STP-UBS">
    <nav>
      <a href="index.html"><img src="icones/INICIO.png" class="icon" alt=""><span>Início</span></a>
      <a href="adicionarpaciente.html"><img src="icones/ADICIONAP.png" class="icon" alt=""><span>Adicionar</span></a>
      <a href="prioridades.html"><img src="icones/PREFERENCIA.png" class="icon" alt=""><span>Prioridades</span></a>
      <a href="mapaPrioridade.html"><img src="icones/MAPA.png" class="icon" alt=""><span>Mapa</span></a>
      <a href="fale.html" class="active"><img src="icones/SUPORTE.png" class="icon" alt=""><span>Suporte</span></a>
      <a href="sobre.html"><img src="icones/SOBRE.png" class="icon" alt=""><span>Sobre</span></a>
    </nav>
  </header>

  <main>
    <section class="content">
      <h2>Fale com o STP-UBS</h2>
      <p>Use o formulário abaixo para enviar suas dúvidas, sugestões ou solicitações de suporte.</p>
      <div id="messageBox"></div>
      <form class="contact-form">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="5" placeholder="Digite sua mensagem" required></textarea>
        <button type="submit" class="login-btn">Enviar</button>
      </form>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="suporteScript.js"></script>
</body>
</html>
