<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Prioridades - STP-UBS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="logo">STP-UBS</div>
  </header>

  <aside class="sidebar">
    <ul>
      <li><a href="index.html">🏠 Início</a></li>
      <li><a href="adicionarpaciente.html">👤Adicionar Paciente</a></li>
      <li><a href="prioridades (1).html" class="active">🏥 Prioridades</a></li>

      <li><a href="sobre.html">ℹ️ Sobre o SUS</a></li>
    </ul>
  </aside>

  <main>
    <section class="content">
      <h2>Classificação de Prioridade</h2>
      <p>Preencha os dados para definir a prioridade do paciente.</p>

      <form class="signup-form">

        <label>Nome do paciente:</label>
        <input type="text" id="nome" required>

        <label>Endereço:</label>
        <input type="text" id="endereco" required>

        <label>Sintomas:</label>
        <input type="text" id="sintomas" placeholder="Digite o sintoma" required>

        <label>Observações:</label>
        <textarea id="obs" rows="3" placeholder="Detalhes adicionais..."></textarea>

        <button type="submit" class="login-btn">Classificar</button>
      </form>

      <div id="resultado" style="margin-top:20px;"></div>

    </section>
  </main>

</body>
</html>
