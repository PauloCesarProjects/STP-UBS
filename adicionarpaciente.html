<!DOCTYPE html>
<!-- Declara o documento como HTML5 -->
<html lang="pt-BR">
<head>
  <!-- Metadados da página -->
  <meta charset="UTF-8">
  <title>Adicionar Paciente - STP-UBS</title>
  <!-- Estilos gerais do site -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Cabeçalho com o título do sistema -->
  <header>
  <div class="header-top">
    <img src="icones/LOGO.png" class="logo-img" alt="STP-UBS">
  </div>
  <nav>
    <a href="index.html"><img src="icones/INICIO.png" class="icon" alt=""><span>Início</span></a>
    <a href="adicionarpaciente.html"><img src="icones/ADICIONAP.png" class="icon" alt=""><span>Adicionar</span></a>
    <a href="prioridades.html"><img src="icones/PREFERENCIA.png" class="icon" alt=""><span>Prioridades</span></a>
    <a href="mapaPrioridade.html"><img src="icones/MAPA.png" class="icon" alt=""><span>Mapa</span></a>
    <a href="fale.html"><img src="icones/SUPORTE.png" class="icon" alt=""><span>Suporte</span></a>
    <a href="sobre.html"><img src="icones/SOBRE.png" class="icon" alt=""><span>Sobre</span></a>
  </nav>
</header>

  <!-- Conteúdo principal da página de cadastro -->
  <main>
    <section class="content">
      <div id="authBanner" class="auth-banner"></div>
      <h2>Adicionar Paciente</h2>
      <p>Preencha os dados abaixo para cadastrar um novo paciente.</p>
      <div id="messageBox"></div>

      <!-- Formulário de cadastro de paciente -->
      <form class="signup-form">
        <!-- Campo de nome completo -->
        <label for="nome">Nome completo:</label> 
        <input type="text" id="nome" name="nome" placeholder="Digite o nome" required>

        <!-- Campo de CPF -->
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="Digite o CPF" required>

        <!-- Campo de data de nascimento -->
        <label for="data-nascimento">Data de nascimento:</label>
        <input type="date" id="data-nascimento" name="data-nascimento" required>

        <!-- Campo de telefone -->
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(xx) xxxxx-xxxx">

        <!-- Campo de endereço -->
        <label for="endereco">Endereço:</label>
        <input type="text" id="endereco" name="endereco" placeholder="Digite o endereço">

        <!-- Campo de sintomas -->
        <label for="sintomas">Sintomas:</label>
        <textarea id="sintomas" name="sintomas" placeholder="Descreva os sintomas do paciente" rows="4"></textarea>

        <!-- Seleção de prioridade de atendimento -->
        <label for="prioridade">Prioridade:</label>
        <select id="prioridade" name="prioridade" required>
          <option value="">Selecione...</option>
          <option value="vermelho">🔴 Vermelho - Emergência</option>
          <option value="laranja">🟠 Laranja - Muito urgente</option>
          <option value="amarelo">🟡 Amarelo - Urgente</option>
          <option value="verde">🟢 Verde - Pouco urgente</option>
          <option value="azul">🔵 Azul - Não urgente</option>
        </select>

        <!-- Botão de envio do formulário -->
        <button type="submit" class="login-btn">Cadastrar Paciente</button>
      </form>
    </section>
  </main>

  <!-- Script que controla o cadastro (validação e envio) -->
  <script src="auth.js"></script>
  <script src="adicionarScript.js"></script>

  <footer>
  <strong>STP-UBS</strong>
  <p>Sistema de Triagem Preventiva para Unidades Básicas de Saúde</p>
</footer>
</body>
</html>
